<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de FIIs</title>
    
    <!-- CSS do Bootstrap para o layout -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS do DataTables para as tabelas interativas -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    
    <style>
        body { padding: 20px; background-color: #f8f9fa; }
        .container-fluid { background-color: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; font-weight: bold; margin-bottom: 20px; }
        .nav-tabs { margin-bottom: 20px; }
        table.dataTable { width: 100% !important; margin-top: 15px !important; }
    </style>
</head>
<body>

<div class="container-fluid">
    <h1>📊 Dashboard Analítico de FIIs</h1>
    
    <!-- Abas de Navegação -->
    <ul class="nav nav-tabs" id="dashTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="base-tab" data-bs-toggle="tab" data-bs-target="#base" type="button" role="tab">Acompanhamento (Base)</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="andamento-tab" data-bs-toggle="tab" data-bs-target="#andamento" type="button" role="tab">Ofertas em Andamento</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="realizadas-tab" data-bs-toggle="tab" data-bs-target="#realizadas" type="button" role="tab">Ofertas Realizadas</button>
        </li>
    </ul>

    <!-- Conteúdo das Abas -->
    <div class="tab-content" id="dashTabsContent">
        
        <!-- Aba: Base (Acompanhamento) -->
        <div class="tab-pane fade show active" id="base" role="tabpanel">
            <h4 class="mb-3">Acompanhamento Setorial (IFIX)</h4>
            <div class="table-responsive">
                <table id="table-base" class="table table-striped table-hover"></table>
            </div>
        </div>

        <!-- Aba: Ofertas em Andamento -->
        <div class="tab-pane fade" id="andamento" role="tabpanel">
            <h4 class="mb-3">Ofertas de FIIs em Andamento</h4>
            <div class="table-responsive">
                <table id="table-andamento" class="table table-striped table-hover"></table>
            </div>
        </div>

        <!-- Aba: Ofertas Realizadas -->
        <div class="tab-pane fade" id="realizadas" role="tabpanel">
            <h4 class="mb-3">Histórico de Ofertas Realizadas</h4>
            <div class="table-responsive">
                <table id="table-realizadas" class="table table-striped table-hover"></table>
            </div>
        </div>

    </div>
</div>

<!-- Scripts Necessários -->
<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- DataTables JS -->
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<!-- PapaParse JS (Lê o CSV) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
    // Função para ler o CSV e renderizar a tabela interativa
    function carregarCSV(arquivo, idTabela) {
        Papa.parse(arquivo, {
            download: true, // Diz ao PapaParse para baixar o arquivo do servidor/github
            header: true,   // Pega a primeira linha do CSV como título das colunas
            skipEmptyLines: true, // Ignora linhas em branco
            complete: function(results) {
                let dados = results.data;
                
                // Se o arquivo estiver vazio ou com erro, aborta
                if (dados.length === 0) return;

                // Extrai dinamicamente os nomes das colunas
                let colunas = Object.keys(dados[0]).map(function(chave) {
                    return { title: chave, data: chave };
                });

                // Inicializa o DataTables
                $(idTabela).DataTable({
                    data: dados,
                    columns: colunas,
                    language: {
                        // Traduz a interface da tabela para Português
                        url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/pt-BR.json'
                    },
                    pageLength: 15, // Quantidade padrão de linhas por página
                    order: []       // Mantém a ordem original do CSV ao carregar
                });
            },
            error: function(err) {
                console.error("Erro ao carregar " + arquivo + ":", err);
            }
        });
    }

    // Assim que a página carregar, puxa os 3 CSVs
    $(document).ready(function() {
        carregarCSV('Base.csv', '#table-base');
        carregarCSV('Ofertas_Andamento.csv', '#table-andamento');
        carregarCSV('Ofertas_Realizadas.csv', '#table-realizadas');
    });
</script>

</body>
</html>
